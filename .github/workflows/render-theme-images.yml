name: Render Theme Images

on:
  workflow_dispatch:
  push:
    paths:
      - "*.omp.json"
      - ".image.settings.json"
      - ".github/workflows/render-theme-images.yml"

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip fontconfig fonts-dejavu-core

      - name: Install oh-my-posh
        run: |
          OMP_BIN="$GITHUB_WORKSPACE/bin"
          mkdir -p "$OMP_BIN"
          curl -s https://ohmyposh.dev/install.sh | bash -s -- -d "$OMP_BIN"
          echo "$OMP_BIN" >> "$GITHUB_PATH"

      - name: Generate theme images
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          themes=( *.omp.json )
          if [ ${#themes[@]} -eq 0 ]; then
            echo "No .omp.json themes found in repository root"
            exit 1
          fi

          mkdir -p out
          for theme in "${themes[@]}"; do
            base="${theme%.omp.json}"
            echo "Rendering ${theme} -> out/${base}.png"
            oh-my-posh config export image --config "$theme" --output "out/${base}.png" --settings ~/.image.settings.json
          done

          ls -lah out

      - name: Upload rendered images
        uses: actions/upload-artifact@v4
        with:
          name: theme-images
          path: out/*.png
          if-no-files-found: error

  commit-screenshots:
    runs-on: ubuntu-latest
    needs: render

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download rendered images to screenshots
        uses: actions/download-artifact@v4
        with:
          name: theme-images
          path: screenshots

      - name: Commit screenshots
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add screenshots

          if git diff --cached --quiet; then
            echo "No changes in screenshots to commit"
            exit 0
          fi

          git commit -m "Update screenshots"
          git push origin "HEAD:${GITHUB_REF_NAME}"
