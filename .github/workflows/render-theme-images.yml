name: Render Theme Images

on:
  workflow_dispatch:
  push:
    paths:
      - "*.omp.json"
      - ".image.settings.json"
      - ".github/workflows/render-theme-images.yml"

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip fontconfig fonts-dejavu-core

      - name: Install oh-my-posh
        run: |
          OMP_BIN="$GITHUB_WORKSPACE/bin"
          mkdir -p "$OMP_BIN"
          curl -s https://ohmyposh.dev/install.sh | bash -s -- -d "$OMP_BIN"
          echo "$OMP_BIN" >> "$GITHUB_PATH"

      - name: Generate theme images
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Activate a virtual environment so venv-related prompt segments render in screenshots.
          python -m venv .my-venv
          source .my-venv/bin/activate

          themes=( *.omp.json )
          if [ ${#themes[@]} -eq 0 ]; then
            echo "No .omp.json themes found in repository root"
            exit 1
          fi

          mkdir -p out
          for theme in "${themes[@]}"; do
            base="${theme%.omp.json}"
            echo "Rendering ${theme} -> out/${base}.png"
            oh-my-posh config export image --config "$theme" --output "out/${base}.png" --settings ~/.image.settings.json
          done

          ls -lah out

      - name: Upload rendered images
        uses: actions/upload-artifact@v4
        with:
          name: theme-images
          path: out/*.png
          if-no-files-found: error

  render-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install oh-my-posh
        shell: pwsh
        run: |
          winget install JanDeDobbeleer.OhMyPosh --source winget --accept-source-agreements --accept-package-agreements

          $ompCmd = Get-Command oh-my-posh -ErrorAction SilentlyContinue
          if (-not $ompCmd) {
            Write-Error "oh-my-posh command not found after install"
          }

          $ompDir = Split-Path -Parent $ompCmd.Path
          "$ompDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Generate theme images (PowerShell)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          # Activate a virtual environment so venv-related prompt segments render in screenshots.
          python -m venv .my-venv
          . .\.my-venv\Scripts\Activate.ps1

          $themes = Get-ChildItem -Path . -Filter *.omp.json -File
          if (-not $themes) {
            Write-Error "No .omp.json themes found in repository root"
          }

          New-Item -ItemType Directory -Path out-windows -Force | Out-Null
          foreach ($theme in $themes) {
            $base = $theme.Name -replace '\.omp\.json$', ''
            $output = Join-Path "out-windows" ("$base.pwsh.png")
            Write-Host "Rendering $($theme.Name) -> $output"
            oh-my-posh config export image --config $theme.FullName --output $output --settings .\.image.settings.json
          }

          Get-ChildItem out-windows | Format-Table Name, Length, LastWriteTime

      - name: Upload rendered images (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: theme-images-windows
          path: out-windows/*.png
          if-no-files-found: error

  commit-screenshots:
    runs-on: ubuntu-latest
    needs:
      - render
      - render-windows

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download rendered images to screenshots
        uses: actions/download-artifact@v4
        with:
          name: theme-images
          path: screenshots

      - name: Download rendered images (Windows) to screenshots
        uses: actions/download-artifact@v4
        with:
          name: theme-images-windows
          path: screenshots

      - name: Commit screenshots
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add screenshots

          if git diff --cached --quiet; then
            echo "No changes in screenshots to commit"
            exit 0
          fi

          git commit -m "Update screenshots ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
          git push origin "HEAD:${GITHUB_REF_NAME}"
